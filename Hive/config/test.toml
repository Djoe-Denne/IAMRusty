# Hive Service Test Configuration

[server]
host = "127.0.0.1"
port = 8082
tls_enabled = false

[auth.jwt]
hs256_secret = "rustycog-test-hs256-secret"

[database]
host = "localhost"
port = 0
db = "test-db"
[database.creds]
username = "postgres"
password = "postgres"
read_replicas = []

[iam_service]
base_url = "http://127.0.0.1:8080"
api_key = ""
timeout_seconds = 10

[external_provider_service]
base_url = "http://127.0.0.1:8080"
api_key = ""
timeout_seconds = 10
max_retries = 3

[command]
[command.retry]
max_attempts = 0
base_delay_ms = 50
max_delay_ms = 5000
backoff_multiplier = 2.0
use_jitter = false

[queue]
type = "sqs"
enabled = false
region = "us-east-1"
account_id = "000000000000"
default_queue = "test-user-events"
host = "localhost"
port = 0
access_key_id = "test"
secret_access_key = "test"
max_retries = 3
timeout_seconds = 30

[logging]
level = "debug"

# Centralized authorization (OpenFGA). Tests run against the wiremock-backed
# OpenFGA fake provided by `rustycog_testing::permission::OpenFgaMockService`,
# which always binds the shared singleton wiremock server to 127.0.0.1:3000
# and pins its store id to `01h0test0store0fixture000openfga`. The
# integration test harness mounts a permissive `mock_check_any(true)` default
# in `setup_test_server()` so route-guard `Check` calls always succeed; tests
# that want to verify denial behavior can override per-tuple via the
# returned `OpenFgaMockService` handle.
[openfga]
api_url = "http://127.0.0.1:3000"
store_id = "01h0test0store0fixture000openfga"
# authorization_model_id = ""
# api_token = ""
# Disable the in-process Check cache so tests can flip mock decisions
# mid-flow and observe them on the very next request, instead of waiting
# for the production 15s TTL to expire.
cache_ttl_seconds = 0

