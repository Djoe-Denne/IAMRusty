[package]
name = "telegraph-infra"
version.workspace = true
edition.workspace = true
authors.workspace = true
description = "Telegraph infrastructure layer"
license.workspace = true

[dependencies]
# Internal crates
telegraph-domain = { path = "../domain" }
telegraph-application = { path = "../application" }
telegraph-configuration = { path = "../configuration" }

# Command pattern
rustycog-command = { path = "../../rustycog/rustycog-command" }

# Configuration
rustycog-config = { path = "../../rustycog/rustycog-config" }

# ORM & PostgreSQL
sea-orm = { workspace = true }

# Events
rustycog-events = { path = "../../rustycog/rustycog-events" }
iam-events = { path = "../../iam-events" }

# Core error handling
rustycog-core = { path = "../../rustycog/rustycog-core" }

# HTTP client
reqwest = { workspace = true }

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }

# Base64 encoding/decoding
base64 = { workspace = true }

# Utility
uuid = { workspace = true }
chrono = { workspace = true }

# Error handling
thiserror = { workspace = true }
anyhow = { workspace = true }

# Logging
tracing = { workspace = true }

# Async
async-trait = { workspace = true }
tokio = { workspace = true }

# Email
lettre = { workspace = true }

# Templating
tera = "1.19"

# AWS SDK for SES and SNS
aws-config = { workspace = true }
aws-sdk-ses = { workspace = true }
aws-sdk-sns = { workspace = true }
aws-sdk-sqs = { workspace = true }
aws-credential-types = { workspace = true }

[dev-dependencies]
tokio = { workspace = true }
mockall = { workspace = true }
rstest = { workspace = true }
tokio-test = { workspace = true }

[features]
default = []
test-utils = ["rustycog-events/test-utils"] 