[package]
name = "http"
version = "0.1.0"
edition = "2021"

[dependencies]
# Internal crates
domain = { path = "../domain" }
application = { path = "../application" }

# HTTP framework
rustycog-http = { path = "../../rustycog/rustycog-http" }
rustycog-server = { path = "../../rustycog/rustycog-server" }

# Core error handling
rustycog-core = { path = "../../rustycog/rustycog-core" }

# Serialization
serde = { version = "1.0.197", features = ["derive"] }
serde_json = "1.0.116"

# Utility
uuid = { version = "1.4.1", features = ["v4", "serde"] }
chrono = { version = "0.4.31", features = ["serde"] }

# Error handling
thiserror = "1.0.56"
anyhow = "1.0.82"

# Logging
tracing = "0.1"

# Async
async-trait = "0.1.77"
tokio = { version = "1.44", features = ["rt-multi-thread", "macros"] }

# Validation
validator = { version = "0.18.1", features = ["derive"] }

[dev-dependencies]
tokio = { version = "1.44", features = ["rt-multi-thread", "macros", "test-util"] }
mockall = "0.13.0"
rstest = "0.23.0" 