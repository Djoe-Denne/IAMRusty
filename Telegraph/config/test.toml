# Telegraph Communication Service Configuration

[server]
host = "127.0.0.1"
port = 8081
tls_enabled = false

[auth.jwt]
hs256_secret = "rustycog-test-hs256-secret"

[logging]
level = "debug"
filter = "debug"

[database]
# Database connection details for Telegraph notifications (test environment)
host = "localhost"
port = 0  # Use test container port
db = "test-db"
# Database credentials
[database.creds]
username = "postgres"
password = "postgres"

# Specify read replicas if using a read/write split
read_replicas = []

# Queue configuration for testing - using SQS
[queue]
type = "sqs"
enabled = true  # Enabled for real SQS integration tests
region = "us-east-1"
account_id = "000000000000"
default_queues = ["telegraph-events"]
# Use new host/port configuration instead of endpoint_url
host = "localhost"
port = 0  # Use random port for testing (will set EXTERNAL_SERVICE_PORTS_START)
access_key_id = "test"
secret_access_key = "test"
max_retries = 3
timeout_seconds = 30

# Telegraph-specific queue configurations
[queues.telegraph-events]
events = ["user_signed_up", "password_reset_requested", "user_email_verified"]

# Event-specific configuration for user_signed_up event
[queues.telegraph-events.user_signed_up]
modes = ["email"]
[queues.telegraph-events.password_reset_requested]
modes = ["email"]

# Event-specific configuration for user_email_verified event - creates database notification
[queues.telegraph-events.user_email_verified]
modes = ["notification"]

# Communication service configuration
[communication.email]
enabled = true
provider = "smtp"  # "dummy", "smtp", "ses"
from_address = "noreply@telegraph.com"
from_name = "Telegraph Service"

[communication.email.smtp]
host = "localhost"
port = 1025
use_tls = false

[communication.template]
enabled = true
template_dir = "resources/templates"

# Centralized authorization (OpenFGA). Tests run against a real
# `openfga/openfga` testcontainer provisioned by
# `rustycog_testing::common::openfga_testcontainer::TestOpenFga`.
# `port = 0` asks `OpenFgaClientConfig::actual_port()` to bind a free
# random host port at startup; the testcontainer fixture maps the
# container's `:8080` to that resolved port and then publishes
# `TELEGRAPH_OPENFGA__SCHEME`, `TELEGRAPH_OPENFGA__HOST`,
# `TELEGRAPH_OPENFGA__PORT`, `TELEGRAPH_OPENFGA__STORE_ID`, and
# `TELEGRAPH_OPENFGA__AUTHORIZATION_MODEL_ID` env vars before the app
# boots. Splitting the URL into scheme/host/port (instead of a single
# `api_url`) mirrors the `[database]` / `[queue]` convention so two test
# binaries can stand up parallel OpenFGA containers on different host
# ports without clashing. The harness writes **no** permissive default;
# each test arranges its own tuples via `openfga.allow(subject, action,
# resource)`.
[openfga]
scheme = "http"
host = "localhost"
port = 0
store_id = ""
# authorization_model_id = ""
# api_token = ""
# Disable the in-process Check cache so tests that grant ➜ revoke ➜ deny
# inside a single process actually observe the second decision instead of
# the cached one from the first call.
cache_ttl_seconds = 0
