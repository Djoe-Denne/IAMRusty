# Telegraph Communication Service Configuration

[server]
host = "127.0.0.1"
port = 8081
tls_enabled = false

[auth.jwt]
hs256_secret = "rustycog-test-hs256-secret"

[logging]
level = "debug"

[database]
# Database connection details for Telegraph notifications (test environment)
host = "localhost"
port = 0  # Use test container port
db = "test-db"
# Database credentials
[database.creds]
username = "postgres"
password = "postgres"

# Specify read replicas if using a read/write split
read_replicas = []

# Queue configuration for testing - using SQS
[queue]
type = "sqs"
enabled = true  # Enabled for real SQS integration tests
region = "us-east-1"
account_id = "000000000000"
# Use new host/port configuration instead of endpoint_url
host = "localhost"
port = 0  # Use random port for testing (will set EXTERNAL_SERVICE_PORTS_START)
access_key_id = "test"
secret_access_key = "test"
max_retries = 3
timeout_seconds = 30

# Telegraph-specific queue configurations
# Example: ma_premiere_queue handles user_signed_up and user_email_verified events
[queues.test-user-events]
events = ["user_signed_up", "password_reset_requested", "user_email_verified"]

# Event-specific configuration for user_signed_up event
[queues.test-user-events.user_signed_up]
modes = ["email"]
[queues.test-user-events.password_reset_requested]
modes = ["email"]

# Event-specific configuration for user_email_verified event - creates database notification
[queues.test-user-events.user_email_verified]
modes = ["notification"]

# Communication service configuration
[communication.email]
enabled = true
provider = "smtp"  # "dummy", "smtp", "ses"
from_address = "noreply@telegraph.com"
from_name = "Telegraph Service"

[communication.email.smtp]
host = "localhost"
port = 1025
use_tls = false

[communication.template]
enabled = true
template_dir = "resources/templates"

# Centralized authorization (OpenFGA). Tests hit the host-mapped OpenFGA
# port. Tests that exercise authorization must inject TELEGRAPH__OPENFGA__STORE_ID
# / TELEGRAPH__OPENFGA__AUTHORIZATION_MODEL_ID after bootstrapping a store.
[openfga]
api_url = "http://localhost:8090"
store_id = ""
# authorization_model_id = ""
# api_token = ""
