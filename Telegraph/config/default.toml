# Telegraph Communication Service Configuration

[server]
host = "localhost"
port = 8080
tls_enabled = false

[auth.jwt]
hs256_secret = "rustycog-dev-hs256-secret"

[logging]
level = "info"

[database]
# Database connection details for Telegraph notifications
host = "localhost"
port = 5432
db = "telegraph_dev"
# Database credentials
[database.creds]
username = "postgres"
password = "postgres"

# Specify read replicas if using a read/write split
read_replicas = []

# Queue configuration for testing - using SQS
[queue]
type = "sqs"
enabled = true  # Enabled for real SQS integration tests
region = "us-east-1"
account_id = "000000000000"
default_queues = ["telegraph-events"]
# Use new host/port configuration instead of endpoint_url
host = "localhost"
port = 0  # Use random port for testing (will set EXTERNAL_SERVICE_PORTS_START)
access_key_id = "test"
secret_access_key = "test"
max_retries = 3
timeout_seconds = 30

# Telegraph-specific queue configurations
# Telegraph consumes IAM communication events from its dedicated physical queue.
[queues.telegraph-events]
events = ["user_signed_up", "password_reset_requested"]

# Event-specific configuration for user_signed_up event
[queues.telegraph-events.user_signed_up]
modes = ["email"]

[queues.telegraph-events.password_reset_requested]
modes = ["email"]

# Communication service configuration
[communication.email]
enabled = true
provider = "dummy"  # "dummy", "smtp", "ses"
from_address = "noreply@telegraph.com"
from_name = "Telegraph Service"

[communication.email.smtp]
host = "localhost"
port = 587
use_tls = false

[communication.notification]
enabled = true
provider = "dummy"  # "dummy", "fcm", "apns"

[communication.sms]
enabled = false
provider = "dummy"  # "dummy", "twilio", "aws_sns"

# Centralized authorization (OpenFGA). Override store_id /
# authorization_model_id via TELEGRAPH_OPENFGA__STORE_ID /
# TELEGRAPH_OPENFGA__AUTHORIZATION_MODEL_ID env vars per environment.
# `host` / `port` follow the same shape as `[database]` / `[queue]`; set
# `port = 0` to ask `OpenFgaClientConfig::actual_port()` to pick a free
# random port (used by the integration test fixture).
[openfga]
scheme = "http"
host = "localhost"
port = 8090
store_id = ""
# authorization_model_id = ""
# api_token = ""
