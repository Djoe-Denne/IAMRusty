# Telegraph Communication Service - Development Configuration
#
# Mirrors test.toml but targets the docker-compose stack on the shared
# `aiforall-network`. Hostnames `postgres`, `localstack`, and `openfga`
# resolve to the matching compose services.

[server]
host = "0.0.0.0"
port = 8080
tls_enabled = false

[auth.jwt]
hs256_secret = "rustycog-dev-hs256-secret"

[logging]
level = "debug"

[database]
host = "postgres"
port = 5432
db = "telegraph_dev"
[database.creds]
username = "postgres"
password = "postgres"

[queue]
type = "sqs"
enabled = true
region = "us-east-1"
account_id = "000000000000"
default_queue = "user-events"
host = "localstack"
port = 4566
access_key_id = "test"
secret_access_key = "test"
max_retries = 3
timeout_seconds = 30

# Telegraph-specific queue → event routing
[queues.test-user-events]
events = ["user_signed_up", "password_reset_requested", "user_email_verified"]

[queues.test-user-events.user_signed_up]
modes = ["email"]
template = "user_signed_up"

[queues.test-user-events.password_reset_requested]
modes = ["email"]
template = "password_reset_requested"

[queues.test-user-events.user_email_verified]
modes = ["notification"]
template = "user_email_verified"

[communication.email]
enabled = true
provider = "smtp"
from_address = "noreply@oodhive.org"
from_name = "AI For All"

[communication.email.smtp]
host = "smtp.tem.scaleway.com"
port = 587
use_tls = true

[communication.template]
enabled = true
template_dir = "resources/templates"

# Centralized authorization (OpenFGA). Override store_id /
# authorization_model_id via TELEGRAPH__OPENFGA__* env vars after
# bootstrapping a store with the fga CLI.
[openfga]
api_url = "http://openfga:8080"
store_id = ""
# authorization_model_id = ""
# api_token = ""
