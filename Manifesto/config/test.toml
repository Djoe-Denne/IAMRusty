# Manifesto Service - Test Configuration

[server]
host = "127.0.0.1"
port = 0
tls_enabled = false

[auth.jwt]
hs256_secret = "rustycog-test-hs256-secret"

[database]
host = "localhost"
port = 0
db = "test-db"
[database.creds]
username = "postgres"
password = "postgres"
read_replicas = []


[command]
[command.retry]
max_attempts = 0
base_delay_ms = 50
max_delay_ms = 5000
backoff_multiplier = 2.0
use_jitter = false

[queue]
type = "sqs"
enabled = false
region = "us-east-1"
account_id = "000000000000"
default_queues = ["test-manifesto-default-events"]
host = "localhost"
port = 0
access_key_id = "test"
secret_access_key = "test"
max_retries = 3
timeout_seconds = 30

[queue.queues]
project_created = ["test-sentinel-sync-events"]
component_added = ["test-sentinel-sync-events"]
component_removed = ["test-sentinel-sync-events"]
member_added = ["test-sentinel-sync-events"]
member_permissions_updated = ["test-sentinel-sync-events"]
member_removed = ["test-sentinel-sync-events"]
permission_granted = ["test-sentinel-sync-events"]
permission_revoked = ["test-sentinel-sync-events"]

# Component-catalog HTTP service. Tests route this through the same shared
# wiremock singleton that hosts the OpenFGA fake; the test harness
# (`Manifesto/tests/common.rs::setup_test_server`) constructs a
# `ComponentServiceMockService` and pre-mounts the default catalog
# (taskboard + wiki). Tests that need a custom catalog or an error response
# can re-arrange via the `components` handle returned from the harness.
[service.component_service]
base_url = "http://127.0.0.1:3000"
timeout_seconds = 10

[logging]
level = "debug"
filter = "debug"

# Centralized authorization (OpenFGA). Tests run against a real
# `openfga/openfga` testcontainer provisioned by
# `rustycog_testing::common::openfga_testcontainer::TestOpenFga`.
# `port = 0` asks `OpenFgaClientConfig::actual_port()` to bind a free
# random host port at startup; the testcontainer fixture maps the
# container's `:8080` to that resolved port and then publishes
# `MANIFESTO_OPENFGA__SCHEME`, `MANIFESTO_OPENFGA__HOST`,
# `MANIFESTO_OPENFGA__PORT`, `MANIFESTO_OPENFGA__STORE_ID`, and
# `MANIFESTO_OPENFGA__AUTHORIZATION_MODEL_ID` env vars before the app
# boots. Splitting the URL into scheme/host/port (instead of a single
# `api_url`) mirrors the `[database]` / `[queue]` convention so two test
# binaries can stand up parallel OpenFGA containers on different host
# ports without clashing. The harness writes **no** permissive default;
# each test arranges its own tuples via `openfga.allow(subject, action,
# resource)`.
[openfga]
scheme = "http"
host = "localhost"
port = 0
store_id = ""
# authorization_model_id = ""
# api_token = ""
# Disable the in-process Check cache so tests that grant ➜ revoke ➜ deny
# inside a single process actually observe the second decision instead of
# the cached one from the first call.
cache_ttl_seconds = 0
