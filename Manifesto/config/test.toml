# Manifesto Service - Test Configuration

[server]
host = "127.0.0.1"
port = 8082
tls_enabled = false

[auth.jwt]
hs256_secret = "rustycog-test-hs256-secret"

[database]
host = "localhost"
port = 0
db = "test-db"
[database.creds]
username = "postgres"
password = "postgres"
read_replicas = []


[command]
[command.retry]
max_attempts = 0
base_delay_ms = 50
max_delay_ms = 5000
backoff_multiplier = 2.0
use_jitter = false

[queue]
type = "disabled"

# Component-catalog HTTP service. Tests route this through the same shared
# wiremock singleton that hosts the OpenFGA fake; the test harness
# (`Manifesto/tests/common.rs::setup_test_server`) constructs a
# `ComponentServiceMockService` and pre-mounts the default catalog
# (taskboard + wiki). Tests that need a custom catalog or an error response
# can re-arrange via the `components` handle returned from the harness.
[service.component_service]
base_url = "http://127.0.0.1:3000"
timeout_seconds = 10

[logging]
level = "debug"

# Centralized authorization (OpenFGA). Tests run against the wiremock-backed
# OpenFGA fake provided by `rustycog_testing::permission::OpenFgaMockService`,
# which always binds the shared singleton wiremock server to 127.0.0.1:3000
# and pins its store id to `01h0test0store0fixture000openfga`. The
# integration test harness mounts a permissive `mock_check_any(true)` default
# in `setup_test_server()` so route-guard `Check` calls always succeed; tests
# that want to verify denial behavior can override per-tuple via the
# returned `OpenFgaMockService` handle.
[openfga]
api_url = "http://127.0.0.1:3000"
store_id = "01h0test0store0fixture000openfga"
# authorization_model_id = ""
# api_token = ""
# Disable the in-process Check cache so tests that grant ➜ revoke ➜ deny
# inside a single process actually observe the second decision instead of
# the cached one from the first call.
cache_ttl_seconds = 0





