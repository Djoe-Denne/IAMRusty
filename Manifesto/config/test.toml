# Manifesto Service - Test Configuration

[server]
host = "127.0.0.1"
port = 8082
tls_enabled = false

[auth.jwt]
hs256_secret = "rustycog-test-hs256-secret"

[database]
host = "localhost"
port = 0
db = "test-db"
[database.creds]
username = "postgres"
password = "postgres"
read_replicas = []


[command]
[command.retry]
max_attempts = 0
base_delay_ms = 50
max_delay_ms = 5000
backoff_multiplier = 2.0
use_jitter = false

[queue]
type = "disabled"

[logging]
level = "debug"

# Centralized authorization (OpenFGA). Tests hit the host-mapped OpenFGA
# port. Tests that exercise authorization must inject MANIFESTO__OPENFGA__STORE_ID
# / MANIFESTO__OPENFGA__AUTHORIZATION_MODEL_ID after bootstrapping a store.
[openfga]
api_url = "http://localhost:8090"
store_id = ""
# authorization_model_id = ""
# api_token = ""





