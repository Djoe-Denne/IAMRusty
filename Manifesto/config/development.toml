# Manifesto Service - Development Configuration
#
# Mirrors test.toml but targets the docker-compose stack on the shared
# `aiforall-network`. Hostnames `postgres`, `localstack`, and `openfga`
# resolve to the matching compose services.

[server]
host = "0.0.0.0"
port = 8080
tls_enabled = false

[auth.jwt]
hs256_secret = "rustycog-dev-hs256-secret"

[database]
host = "postgres"
port = 5432
db = "manifesto_dev"
[database.creds]
username = "postgres"
password = "postgres"

[command]
[command.retry]
max_attempts = 0
base_delay_ms = 50
max_delay_ms = 5000
backoff_multiplier = 2.0
use_jitter = false

[queue]
type = "sqs"
enabled = true
region = "us-east-1"
account_id = "000000000000"
default_queues = ["sentinel-sync-events"]
host = "localstack"
port = 4566
access_key_id = "test"
secret_access_key = "test"
max_retries = 3
timeout_seconds = 30

[queue.queues]
project_created = ["sentinel-sync-events"]
component_added = ["sentinel-sync-events"]
component_removed = ["sentinel-sync-events"]
member_added = ["sentinel-sync-events"]
member_permissions_updated = ["sentinel-sync-events"]
member_removed = ["sentinel-sync-events"]
permission_granted = ["sentinel-sync-events"]
permission_revoked = ["sentinel-sync-events"]

[logging]
level = "debug"

# Centralized authorization (OpenFGA). Override store_id /
# authorization_model_id via MANIFESTO_OPENFGA__* env vars after
# bootstrapping a store with the fga CLI.
[openfga]
scheme = "http"
host = "openfga"
port = 8080
store_id = ""
# authorization_model_id = ""
# api_token = ""
