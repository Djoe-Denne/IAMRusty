# Manifesto Service - Default Configuration

[server]
host = "127.0.0.1"
port = 8080
tls_enabled = false

[auth.jwt]
hs256_secret = "rustycog-dev-hs256-secret"

[database]
host = "localhost"
port = 0
db = "test-db"
[database.creds]
username = "postgres"
password = "postgres"
read_replicas = []


[command]
[command.retry]
max_attempts = 0
base_delay_ms = 50
max_delay_ms = 5000
backoff_multiplier = 2.0
use_jitter = false

[queue]
type = "disabled"

[logging]
level = "debug"

# Centralized authorization (OpenFGA). Override store_id /
# authorization_model_id via MANIFESTO_OPENFGA__STORE_ID /
# MANIFESTO_OPENFGA__AUTHORIZATION_MODEL_ID env vars per environment.
# `host` / `port` follow the same shape as `[database]` / `[queue]`; set
# `port = 0` to ask `OpenFgaClientConfig::actual_port()` to pick a free
# random port (used by the integration test fixture).
[openfga]
scheme = "http"
host = "localhost"
port = 8090
store_id = ""
# authorization_model_id = ""
# api_token = ""



