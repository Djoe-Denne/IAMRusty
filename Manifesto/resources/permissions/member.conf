# Member Permission Model
#
# This file defines the permission rules for member resources.
# Members are "unidentified resources" - permissions apply to all members
# in a project, not specific ones.
#
# Format: role, resource, action
#
# Roles: owner, admin, write, read, public (for public projects)
# Actions: create, read, update, delete, publish, archive

[request_definition]
r = sub, project, act
r2 = sub, project, member, act

[policy_definition]
p = sub, project, act
p2 = sub, project, member, act

[policy_effect]
e = some(where (p.eft == allow))
e2 = some(where (p.eft == allow))

[matchers]
m = (r.sub == p.sub && r.project == p.project && r.act == p.act)
# For member operations with 2 resources, ignore the specific member_id
# Permission is based on project membership only (unidentified resource)
m2 = (r2.sub == p2.sub && r2.project == p2.project && r2.act == p2.act)

