# Project Permission Model
#
# This file defines the permission rules for project resources.
# Format: role, resource, action
#
# Roles: owner, admin, write, read, public (for public projects)
# Actions: create, read, update, delete, publish, archive

[request_definition]
r = sub, project, act

[policy_definition]
p = sub, project, act

[policy_effect]
e = some(where (p.eft == allow))

[matchers]
m = (r.sub == p.sub && r.project == p.project && r.act == p.act)