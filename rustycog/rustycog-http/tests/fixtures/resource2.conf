[request_definition]
r = sub, obj1, act
r2 = sub, obj1, obj2, act

[policy_definition]
p = sub, obj1, act
p2 = sub, obj1, obj2, act

[policy_effect]
e = some(where (p.eft == allow))
e2 = some(where (p.eft == allow))

[matchers]
m = r.sub == p.sub && r.obj1 == p.obj1 && r.act == p.act
m2 = r2.sub == p2.sub && r2.obj1 == p2.obj1 && r2.obj2 == p2.obj2 && r2.act == p2.act


