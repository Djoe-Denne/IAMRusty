[package]
name = "rustycog-http"
version.workspace = true
edition.workspace = true
authors.workspace = true
description = "HTTP server utilities for RustyCog"
license.workspace = true

[dependencies]
rustycog-core = { path = "../rustycog-core" }
rustycog-command = { path = "../rustycog-command" }
rustycog-config = { path = "../rustycog-config" }
axum.workspace = true
tower.workspace = true
tower-http.workspace = true
serde.workspace = true
serde_json.workspace = true
thiserror.workspace = true
async-trait.workspace = true
uuid.workspace = true
chrono.workspace = true
tracing.workspace = true
validator.workspace = true
jsonwebtoken.workspace = true
base64.workspace = true

anyhow.workspace = true
axum-server = { version = "0.7.1", features = ["tls-rustls"] }
axum-valid = { version = "0.23", features = ["validator", "422", "into_json"] }
tokio = { workspace = true, features = ["net"] } 