[package]
name = "rustycog-config"
version.workspace = true
edition.workspace = true
authors.workspace = true
description = "Configuration management for RustyCog"
license.workspace = true

[dependencies]
# Serialization
serde = { version = "1.0.197", features = ["derive"] }

# Configuration loading
config = "0.14.0"
dotenvy = "0.15.7"
toml = "0.8.22"

# URL parsing
url = "2.5.2"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

[dev-dependencies]
# Testing libraries for comprehensive unit testing
mockall = "0.13.0"
rstest = "0.23.0"
tokio-test = "0.4.4"
claims = "0.7.1"
tempfile = "3.8.0"
serde_json = "1.0.140"

tokio = { version = "1.44", features = ["rt-multi-thread", "macros"] } 