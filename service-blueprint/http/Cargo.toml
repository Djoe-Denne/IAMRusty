[package]
name = "{{SERVICE_NAME}}-http_server"
version.workspace = true
edition.workspace = true
authors.workspace = true
description = "{{SERVICE_NAME}} HTTP layer"
license.workspace = true

[dependencies]
# Internal crates
{{SERVICE_NAME}}-domain = { path = "../domain" }
{{SERVICE_NAME}}-application = { path = "../application" }

# HTTP framework and utilities
rustycog-http = { path = "../../rustycog/rustycog-http" }
rustycog-config = { path = "../../rustycog/rustycog-config" }
axum = { workspace = true }
hyper = { workspace = true }

# Utility
serde = { workspace = true }
serde_json = { workspace = true }
