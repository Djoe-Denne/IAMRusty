version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: iam_dev
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  iam-service:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"   # HTTP port
      - "8443:8443"   # HTTPS port
    environment:
      - RUN_ENV=${RUN_ENV:-production}
      - RUST_LOG=info,tower_http=debug
      # Uncomment and set to enable HTTPS
      # - APP_SERVER_TLS_ENABLED=true
      # - APP_SERVER_TLS_CERT_PATH=/app/certs/cert.pem
      # - APP_SERVER_TLS_KEY_PATH=/app/certs/key.pem
    volumes:
      - ./keys:/app/keys
      - ./config:/app/config
      - ./certs:/app/certs  # Mount certificates directory
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data: 