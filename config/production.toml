# Production environment configuration

[server]
host = "0.0.0.0"
port = 8080
tls_enabled = true
tls_cert_path = "/etc/ssl/certs/iam.crt"
tls_key_path = "/etc/ssl/private/iam.key"
tls_port = 8443

[database]
# Database connection details
host = "db"
port = 5432
db = "iam_prod"
# Database credentials
[database.creds]
username = "postgres"
password = "postgres"

# Add read replicas for production
read_replicas = ["postgres://postgres:postgres@db-read-1:5432/iam_prod", "postgres://postgres:postgres@db-read-2:5432/iam_prod"]

[oauth.github]
# Production values should be set via environment variables
# These are just placeholders
redirect_uri = "https://your-domain.com/api/auth/github/callback"

[oauth.gitlab]
# Production values should be set via environment variables  
# These are just placeholders
redirect_uri = "https://your-domain.com/api/auth/gitlab/callback"

# Set longer JWT expiration for production
[jwt]
secret = "CHANGE-THIS-IN-PRODUCTION-256-BIT-SECRET-KEY"
expiration_seconds = 900  # 15 minutes
refresh_token_expiration_seconds = 2592000  # 30 days

# Command configuration for production
[command.retry]
# Conservative retry settings for production
max_attempts = 3
base_delay_ms = 500
max_delay_ms = 60000  # 1 minute max delay
backoff_multiplier = 2.0
use_jitter = true

# Command-specific overrides for production (example)
[command.overrides.critical_command]
max_attempts = 5
base_delay_ms = 1000
max_delay_ms = 30000
backoff_multiplier = 1.8
use_jitter = true

# Note: Logging configuration should be handled by the application logger, not config
# You can set RUST_LOG environment variable for log levels

# Kafka configuration for production
[kafka]
enabled = true
host = "kafka.production.com"
port = 9092
user_events_topic = "user-events"
client_id = "iam-service"
timeout_ms = 5000
max_retries = 3
compression = "gzip"
security_protocol = "ssl"
# Use environment variables for production secrets:
# IAM_KAFKA__SASL_USERNAME=your-kafka-username
# IAM_KAFKA__SASL_PASSWORD=your-kafka-password 