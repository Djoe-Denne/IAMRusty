# IAM Service Configuration

[server]
host = "127.0.0.1"
port = 8080
# HTTPS configuration
tls_enabled = false
tls_cert_path = "./certs/cert.pem"
tls_key_path = "./certs/key.pem"
# When TLS is enabled, use this port instead
tls_port = 8443

[database]
url = "postgres://postgres:postgres@localhost:5432/iam"
# Specify read replicas if using a read/write split
# read_replicas = ["postgres://postgres:postgres@replica1:5432/iam", "postgres://postgres:postgres@replica2:5432/iam"]

[oauth.github]
client_id = "your-github-client-id"
client_secret = "your-github-client-secret"
# Update to HTTPS when TLS is enabled
redirect_uri = "http://localhost:8080/auth/github/callback"

[oauth.gitlab]
client_id = "your-gitlab-client-id"
client_secret = "your-gitlab-client-secret"
# Update to HTTPS when TLS is enabled  
redirect_uri = "http://localhost:8080/auth/gitlab/callback"

[jwt]
secret = "your-jwt-secret-key-should-be-at-least-32-bytes"
expiration_seconds = 3600 