# IAM Service Test Configuration
# This configuration is used by integration tests

# Test environment configuration

[server]
host = "127.0.0.1"
port = 8081
tls_enabled = false

[auth.jwt]
hs256_secret = "rustycog-test-hs256-secret"

[database]
# Database connection details
host = "localhost"
port = 0  # Use random port for testing
db = "test-db"
# Database credentials
[database.creds]
username = "postgres"
password = "postgres"

[oauth.github]
client_id = "test_github_client_id"
client_secret = "test_github_client_secret"
redirect_uri = "http://127.0.0.1:8081/api/auth/github/callback"
# These URLs will be overridden by test setup to use mock server
auth_url = "http://localhost:3000/login/oauth/authorize"
token_url = "http://localhost:3000/login/oauth/access_token"
user_url = "http://localhost:3000/user"

[oauth.gitlab]
client_id = "test_gitlab_client_id"
client_secret = "test_gitlab_client_secret"
redirect_uri = "http://127.0.0.1:8081/api/auth/gitlab/callback"
# These URLs will be overridden by test setup to use mock server
auth_url = "http://localhost:3000/oauth/authorize"
token_url = "http://localhost:3000/oauth/token"
user_url = "http://localhost:3000/api/v4/user"

[jwt]
expiration_seconds = 900  # 15 minutes
refresh_token_expiration_seconds = 2592000  # 30 days

# JWT secret configuration using HS256 shared secret
[jwt.secret]
type = "plain"
value = "rustycog-test-hs256-secret"

# Enable maximum logging for tests
[logging]
level = ""

# Command configuration for testing
[command.retry]
# Faster retry settings for tests
max_attempts = 0
base_delay_ms = 50
max_delay_ms = 5000
backoff_multiplier = 2.0
use_jitter = false  # Disable jitter for predictable test behavior

# Queue configuration for testing - using SQS
[queue]
enabled = false
type = "sqs"
region = "us-east-1"
account_id = "000000000000"
default_queues = ["test-iam-default-events"]
# Use new host/port configuration instead of endpoint_url
host = "localhost"
port = 0  # Use random port for testing (will set EXTERNAL_SERVICE_PORTS_START)
access_key_id = "test"
secret_access_key = "test"
max_retries = 3
timeout_seconds = 30

# Queue mappings for different event types (can be extended)
[queue.queues]
user_signed_up = ["test-telegraph-events"]
user_email_verified = ["test-telegraph-events"]
password_reset_requested = ["test-telegraph-events"]
