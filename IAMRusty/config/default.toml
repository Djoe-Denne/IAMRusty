# IAM Service Default Configuration

[server]
host = "127.0.0.1"
port = 8080
tls_enabled = false
tls_cert_path = "./certs/cert.pem"
tls_key_path = "./certs/key.pem"
tls_port = 8443

[database]
# Database connection details
host = "localhost"
port = 5432
db = "iam_dev"
# Database credentials
[database.creds]
username = "postgres"
password = "postgres"

# Specify read replicas if using a read/write split
read_replicas = []

[oauth.github]
client_id = "your-github-client-id"
client_secret = "your-github-client-secret"
redirect_uri = "http://localhost:8080/api/auth/github/callback"
auth_url = "https://github.com/login/oauth/authorize"
token_url = "https://github.com/login/oauth/access_token"
user_url = "https://api.github.com/user"

[oauth.gitlab]
client_id = "your-gitlab-client-id"
client_secret = "your-gitlab-client-secret"
redirect_uri = "http://localhost:8080/api/auth/gitlab/callback"
auth_url = "https://gitlab.com/oauth/authorize"
token_url = "https://gitlab.com/oauth/token"
user_url = "https://gitlab.com/api/v4/user"

[jwt]
expiration_seconds = 900  # 15 minutes
refresh_token_expiration_seconds = 2592000  # 30 days

# JWT secret configuration using PEM files for testing
[jwt.secret]
type = "pem_file"
private_key_path = "./config/certs/key.pem"
public_key_path = "./config/certs/public_key.pem"
key_id = "jwt-key-test"

# Queue configuration - can be either Kafka or SQS
[queue]
type = "kafka"  # Default to Kafka, can be changed to "sqs" or "disabled"

# Kafka configuration for event publishing
[queue.kafka]
enabled = true
host = "localhost"
port = 9092
user_events_topic = "user-events"
client_id = "iam-service"
timeout_ms = 5000
max_retries = 3
compression = "gzip"
security_protocol = "plaintext"
# Additional broker hosts for multi-broker setups (optional)
additional_brokers = []
# Optional SASL configuration
# sasl_mechanism = "PLAIN"
# sasl_username = "your-kafka-username"
# sasl_password = "your-kafka-password"

# SQS configuration for event publishing (alternative to Kafka)
[queue.sqs]
enabled = false  # Disabled by default, enable when using SQS
region = "us-east-1"
account_id = "123456789012"
default_queue = "user-events"
# Queue mappings for different event types (can be extended)
[queue.sqs.queues]
user_signed_up = "user-events"
user_email_verified = "user-events"
user_logged_in = "user-events"
# For LocalStack development/testing, use host/port:
host = "localhost"
port = 4566
# For production AWS, leave host as empty to use AWS endpoints
# host = ""
# port = 443
access_key_id = "your-aws-access-key"
secret_access_key = "your-aws-secret-key"
max_retries = 3
timeout_seconds = 30

# Legacy Kafka configuration for backward compatibility
[kafka]
enabled = true
host = "localhost"
port = 9092
user_events_topic = "user-events"
client_id = "iam-service"
timeout_ms = 5000
max_retries = 3
compression = "gzip"
security_protocol = "plaintext"
# Additional broker hosts for multi-broker setups (optional)
additional_brokers = []
# Optional SASL configuration
# sasl_mechanism = "PLAIN"
# sasl_username = "your-kafka-username"
# sasl_password = "your-kafka-password"

# Command configuration
[command.retry]
# Default retry configuration for all commands
max_attempts = 3
base_delay_ms = 100
max_delay_ms = 30000
backoff_multiplier = 2.0
use_jitter = true 