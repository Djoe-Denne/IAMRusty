# IAM Service Default Configuration

[server]
host = "127.0.0.1"
port = 8080
tls_enabled = false
tls_cert_path = "./certs/cert.pem"
tls_key_path = "./certs/key.pem"
tls_port = 8443

[database]
# Database connection details
host = "localhost"
port = 5432
db = "iam_dev"
# Database credentials
[database.creds]
username = "postgres"
password = "postgres"

# Specify read replicas if using a read/write split
read_replicas = []

[oauth.github]
client_id = "your-github-client-id"
client_secret = "your-github-client-secret"
redirect_uri = "http://localhost:8080/api/auth/github/callback"
auth_url = "https://github.com/login/oauth/authorize"
token_url = "https://github.com/login/oauth/access_token"
user_url = "https://api.github.com/user"

[oauth.gitlab]
client_id = "your-gitlab-client-id"
client_secret = "your-gitlab-client-secret"
redirect_uri = "http://localhost:8080/api/auth/gitlab/callback"
auth_url = "https://gitlab.com/oauth/authorize"
token_url = "https://gitlab.com/oauth/token"
user_url = "https://gitlab.com/api/v4/user"

[jwt]
expiration_seconds = 900  # 15 minutes
refresh_token_expiration_seconds = 2592000  # 30 days

# JWT secret configuration using PEM files for testing
[jwt.secret]
type = "pem_file"
private_key_path = "./config/certs/key.pem"
public_key_path = "./config/certs/public_key.pem"
key_id = "jwt-key-test"

# Queue configuration for testing - using SQS
[queue]
type = "sqs"
enabled = true  # Enabled for real SQS integration tests
region = "us-east-1"
account_id = "000000000000"
default_queue = "test-user-events"
# Use new host/port configuration instead of endpoint_url
host = "localhost"
port = 0  # Use random port for testing (will set EXTERNAL_SERVICE_PORTS_START)
access_key_id = "test"
secret_access_key = "test"
max_retries = 3
timeout_seconds = 30

# Queue mappings for different event types (can be extended)
[queue.queues]
user_signed_up = "test-user-events"

# Legacy Kafka configuration kept for backward compatibility tests
[kafka]
enabled = false  # Disabled by default, can be enabled for Kafka-specific tests
host = "localhost"
port = 0  # Use random port for testing to avoid conflicts
user_events_topic = "test-user-events"
client_id = "iam-service-test"
timeout_ms = 5000
max_retries = 3
compression = "none"
security_protocol = "plaintext"

