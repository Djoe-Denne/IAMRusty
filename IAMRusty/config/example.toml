# Development environment configuration

[server]
host = "127.0.0.1"
port = 8080

[auth.jwt]
hs256_secret = "rustycog-dev-hs256-secret"

[database]
# Use a different database for development
db = "iam_dev"

[oauth.github]
# Development GitHub OAuth settings
redirect_uri = "http://www.github.com/api/auth/github/callback"

[oauth.gitlab]
# Development GitLab OAuth settings  
redirect_uri = "http://www.gitlab.com/api/auth/gitlab/callback"

[jwt]
expiration_seconds = 900  # 15 minutes
refresh_token_expiration_seconds = 2592000  # 30 days

# JWT secret configuration using HS256 shared secret
[jwt.secret]
type = "plain"
value = "rustycog-dev-hs256-secret"

# Queue configuration for development - using SQS with LocalStack
[queue]
enabled = true
type = "sqs"
region = "us-east-1"
account_id = "000000000000"  # LocalStack default
default_queue = "user-events"
host = "localhost"
port = 4566
access_key_id = "test"
secret_access_key = "test"
max_retries = 3
timeout_seconds = 30

# Queue mappings for different event types
[queue.queues]
user_signed_up = "user-events"

# Kafka configuration for event publishing (alternative to SQS)
[kafka]
enabled = false  # Disabled in favor of SQS for development
host = "localhost"
port = 9092
user_events_topic = "user-events"
client_id = "iam-service-dev"
timeout_ms = 5000
max_retries = 3
compression = "gzip"
security_protocol = "plaintext"

# For SSL development setup:
# 1. Enable SSL feature in Cargo.toml: rdkafka = { features = ["cmake-build", "ssl", "tokio"] }
# 2. Uncomment and configure the following:
# security_protocol = "ssl"
# ssl_ca_location = "probe"  # Use system CA certificates
# ssl_certificate_location = "/path/to/client-cert.pem"  # Optional for mutual TLS
# ssl_key_location = "/path/to/client-key.pem"  # Optional for mutual TLS
# ssl_key_password = "client-key-password"  # Optional if key is encrypted

# For SASL authentication (works with or without SSL):
# sasl_mechanism = "PLAIN"  # or "SCRAM-SHA-256", "SCRAM-SHA-512"
# sasl_username = "kafka-username"
# sasl_password = "kafka-password"
# security_protocol = "sasl_plaintext"  # or "sasl_ssl" if using SSL

# Command configuration for development
[command.retry]
# Faster retries for development
max_attempts = 2
base_delay_ms = 50
max_delay_ms = 5000
backoff_multiplier = 2.0
use_jitter = false

# Enable debug level logging
[logging]
level = "debug"
