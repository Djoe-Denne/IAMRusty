# IAM Service - Development Configuration
#
# This profile mirrors the test configuration but targets the docker-compose
# stack on the shared `aiforall-network`. Hostnames such as `postgres`,
# `localstack`, and `openfga` resolve to the matching compose services.

[server]
host = "0.0.0.0"
port = 8080
tls_enabled = false

[auth.jwt]
hs256_secret = "rustycog-dev-hs256-secret"

[database]
host = "postgres"
port = 5432
db = "iam_dev"
[database.creds]
username = "postgres"
password = "postgres"

[oauth.github]
client_id = "Iv23liMmfDciF6YoCdIb"
client_secret = "dev_github_client_secret"
redirect_uri = "http://localhost:5173/oauth/github/callback"
auth_url = "https://github.com/login/oauth/authorize"
token_url = "https://github.com/login/oauth/access_token"
user_url = "https://api.github.com/user"

[oauth.gitlab]
client_id = "your-gitlab-client-id"
client_secret = "your-gitlab-client-secret"
redirect_uri = "http://localhost:5173/oauth/gitlab/callback"
auth_url = "https://gitlab.com/oauth/authorize"
token_url = "https://gitlab.com/oauth/token"
user_url = "https://gitlab.com/api/v4/user"

[jwt]
expiration_seconds = 900
refresh_token_expiration_seconds = 2592000

[jwt.secret]
type = "plain"
value = "rustycog-dev-hs256-secret"

[logging]
level = "debug"

[command.retry]
max_attempts = 0
base_delay_ms = 50
max_delay_ms = 5000
backoff_multiplier = 2.0
use_jitter = false

[queue]
type = "sqs"
enabled = true
region = "us-east-1"
account_id = "000000000000"
default_queues = ["telegraph-events"]
host = "localstack"
port = 4566
access_key_id = "test"
secret_access_key = "test"
max_retries = 3
timeout_seconds = 30

[queue.queues]
user_signed_up = ["telegraph-events"]
user_email_verified = ["telegraph-events"]
password_reset_requested = ["telegraph-events"]
