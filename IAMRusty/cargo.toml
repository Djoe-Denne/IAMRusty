[package]
name = "iam-service"
version = "0.1.0"
edition = "2024"
authors = ["DjoÃ© Denne <djoe.denne@gmail.com>"]
description = "IAM microservice with OAuth2, OpenID Connect, JWT, PostgreSQL, Axum, and SeaORM"
license = "MIT OR Apache-2.0"

[workspace]
members = ["domain", "application", "infra", "http", "migration", "setup", "configuration"]

[dependencies]
# Internal workspace crates
domain = { path = "domain" }
application = { path = "application" }
infra = { path = "infra" }
http_server = { path = "http" }
setup = { path = "setup" }
configuration = { path = "configuration" }

# Web & HTTP
axum = { version = "0.8.4", features = ["macros", "json"] }
tokio = { version = "1.44", features = ["rt-multi-thread", "macros"] }
hyper = "1.3"

# ORM & PostgreSQL
sea-orm = { version = "1.1.11", features = ["sqlx-postgres", "runtime-tokio-rustls", "macros"] }
sea-orm-migration = { version = "1.1.11", optional = true }

# Auth
oauth2 = { version = "4.4.2", features = ["reqwest"] }
openidconnect = { version = "4.0.0", features = ["reqwest"] }
jsonwebtoken = "9.0.2"

# Utility
serde = { version = "1.0.197", features = ["derive"] }
serde_json = "1.0.116"
uuid = { version = "1.4.1", features = ["v4", "serde"] }
chrono = { version = "0.4.31", features = ["serde"] }
dotenvy = "0.15.7"
config = "0.14.0"

# Error handling
thiserror = "1.0.56"
anyhow = "1.0.82"

# Logging and tracing
tracing = "0.1.40"
tracing-subscriber = { version = "0.3.18", features = ["env-filter", "fmt", "json"] }

# Middleware / tower layers
tower = { version = "0.4.13", features = ["util"] }
tower-http = { version = "0.5.2", features = ["trace", "catch-panic"] }

[dev-dependencies]
tokio = { version = "1.44", features = ["rt-multi-thread", "macros"] }
axum-test = "17.3.0"
tokio-test = "0.4.3"
wiremock = "0.6.0"
testcontainers = { version = "0.23.1", features = ["blocking"] }
testcontainers-modules = { version = "0.11.0", features = ["postgres", "localstack"] }
sqlx = { version = "0.8.2", features = ["postgres", "runtime-tokio-rustls", "uuid", "chrono"] }
sea-orm-cli = "1.1.11"
url = "2.5.0"
futures = "0.3.30"
tracing-subscriber = { version = "0.3.18", features = ["env-filter", "fmt"] }
migration = { path = "migration" }
serial_test = "3.0.0"
ctrlc = "3.4.0"
libc = "0.2"
ctor = "0.2.0"
rand = "0.8.5"
async-trait = "0.1.74"
reqwest = { version = "0.12.0", features = ["json"] }
base64 = "0.22.0"
rdkafka = { version = "0.36.2", features = ["cmake-build", "tokio"] }
aws-sdk-sqs = "1.0"
aws-config = "1.0"
aws-credential-types = "1.0"
infra = { path = "infra", features = ["test-utils"] }
rustycog-events = { path = "../rustycog/rustycog-events", features = ["test-utils"] }
