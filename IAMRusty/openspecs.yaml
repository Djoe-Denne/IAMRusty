openapi: 3.1.0
info:
  title: IAM Service API
  version: 1.3.0
  description: |
    This API allows third-party clients to authenticate users via OAuth2 providers (e.g., GitHub, GitLab) and retrieve basic user profile information.
    
    **Token Management:**
    - JWT access tokens have a configurable expiration time (default: 15 minutes)
    - Refresh tokens have a configurable expiration time (default: 30 days)
    - Refresh token rotation is implemented for enhanced security - each refresh operation generates a new refresh token and invalidates the old one
    
    **User Model Update:**
    - Users are now provider-agnostic and can link multiple OAuth2 providers to a single account.
    - Email addresses are managed in a separate entity (`user_emails`).
    - The `email` field in user responses always returns the user's primary email (if available).
    - Users can have multiple emails, but only one is primary.
    - The system supports multi-provider login and account linking.
    
    **OAuth Flow Enhancement:**
    - The same `/start` and `/callback` endpoints handle both login and provider linking operations.
    - When an authenticated user accesses `/start`, it initiates a "link provider" flow.
    - When an unauthenticated user accesses `/start`, it initiates a "login" flow.
    - The operation type is encoded in the OAuth `state` parameter for security.
    
    It also supports issuing JWT tokens and serving public keys for token validation.

servers:
  - url: https://iam.example.com

paths:
  /api/auth/signup:
    post:
      summary: Sign up with email and password
      description: |
        Creates user account. Returns 202 for new user (requires username selection via /auth/complete-registration).
        Returns 409 if email already has password authentication.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email: {type: string, format: email}
                password: {type: string, minLength: 8}
              required: [email, password]
      responses:
        "202":
          description: New user created - username required
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    type: object
                    properties:
                      id: {type: string}
                      email: {type: string}
                  registration_token: {type: string, description: "RSA-signed JWT"}
                  requires_username: {type: boolean, example: true}
                  message: {type: string}
        "409":
          description: Email already has password authentication
          content:
            application/json:
              schema:
                type: object
                properties:
                  error: {type: string}
                  message: {type: string}
        "422":
          description: Validation error (invalid email format, weak password, missing fields)
          content:
            application/json:
              schema:
                type: object
                properties:
                  error: {type: string}
                  message: {type: string}

  /api/auth/login:
    post:
      summary: Log in with email and password
      description: Only works for users with completed registration (have username). Returns 423 if registration incomplete.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email: {type: string, format: email}
                password: {type: string}
              required: [email, password]
      responses:
        "200":
          description: Authentication successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    type: object
                    properties:
                      id: {type: string}
                      username: {type: string}
                      email: {type: string}
                  access_token: {type: string}
                  expires_in: {type: integer}
                  refresh_token: {type: string}
        "401":
          description: Invalid credentials
        "422":
          description: Validation error (missing fields, invalid format)
        "423":
          description: Account exists but registration incomplete
          content:
            application/json:
              schema:
                type: object
                properties:
                  error: {type: string, example: "registration_incomplete"}
                  message: {type: string}
                  registration_token: {type: string, description: "RSA-signed JWT"}
          
  /api/auth/verify:
    post:
      summary: Verify user email with a token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                verification_token:
                  type: string
              required:
                - email
                - verification_token
      responses:
        "200":
          description: Email successfully verified
        "400":
          description: Invalid or expired verification token
        "404":
          description: Email not found or already verified
        "422":
          description: Validation error (missing fields, invalid format)

  /api/auth/resend-verification:
    post:
      summary: Resend email verification token
      description: |
        Resends a verification email to the specified email address if it exists and is unverified.
        
        **Security Note:** This endpoint always returns a 200 OK response with a generic message 
        to prevent user enumeration attacks. The actual behavior depends on the email status:
        - If email exists and is unverified: sends a new verification email and invalidates old tokens
        - If email is already verified: no action taken (silent success)
        - If email doesn't exist: no action taken (silent success)
        
        **Token Management:** When a new verification token is created, any existing verification 
        tokens for the same email are automatically invalidated to prevent token accumulation attacks.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                  description: Email address to resend verification for
              required:
                - email
      responses:
        "200":
          description: Generic success response (always returned for security)
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "If your email is registered and unverified, a verification email has been sent"
              example:
                message: "If your email is registered and unverified, a verification email has been sent"
        "422":
          description: Validation error (invalid email format, missing fields, malformed JSON)
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      message:
                        type: string
                      status:
                        type: integer
                        example: 422
              examples:
                invalid_email:
                  summary: Invalid email format
                  value:
                    error:
                      message: "Invalid email format"
                      status: 422
                missing_email:
                  summary: Missing email field
                  value:
                    error:
                      message: "Email field is required"
                      status: 422

  /api/auth/password/reset-request:
    post:
      summary: Request password reset
      description: |
        Initiates a password reset process by generating a secure reset token and sending it via email.
        
        **Security Note:** This endpoint always returns a 200 OK response with a generic message 
        to prevent user enumeration attacks. The actual behavior depends on the email status:
        - If email exists and has password authentication: sends a password reset email
        - If email doesn't exist or doesn't have password authentication: no action taken (silent success)
        
        **Token Management:** When a new reset token is created, any existing reset tokens 
        for the same email are automatically invalidated to prevent token accumulation attacks.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                  description: Email address to send password reset instructions
              required:
                - email
      responses:
        "200":
          description: Generic success response (always returned for security)
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "If your email is registered with password authentication, a reset link has been sent"
        "422":
          description: Validation error (invalid email format, missing fields)
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      message:
                        type: string
                      status:
                        type: integer
                        example: 422

  /api/auth/password/reset-validate:
    post:
      summary: Validate password reset token
      description: |
        Validates a password reset token without consuming it. Used to verify token validity 
        before showing the password reset form.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                token:
                  type: string
                  description: Password reset token from email
              required:
                - token
      responses:
        "200":
          description: Token is valid
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid:
                    type: boolean
                    example: true
                  email:
                    type: string
                    description: Email associated with the token (masked for privacy)
                    example: "u***@example.com"
        "400":
          description: Invalid or expired token
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      message:
                        type: string
                        example: "Invalid or expired reset token"
                      status:
                        type: integer
                        example: 400
        "422":
          description: Validation error (missing token field)
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      message:
                        type: string
                      status:
                        type: integer
                        example: 422

  /api/auth/password/reset-confirm:
    post:
      summary: Reset password (unauthenticated)
      description: |
        Resets the password using a valid reset token. This endpoint is for unauthenticated users 
        who have received a reset token via email.
        
        **Security:** The reset token is consumed (invalidated) upon successful password reset.
        All existing refresh tokens for the user are also invalidated for security.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                token:
                  type: string
                  description: Password reset token from email
                new_password:
                  type: string
                  minLength: 8
                  description: New password (minimum 8 characters)
              required:
                - token
                - new_password
      responses:
        "200":
          description: Password successfully reset
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Password successfully reset"
                  user:
                    type: object
                    properties:
                      id:
                        type: string
                      username:
                        type: string
                      email:
                        type: string
                  access_token:
                    type: string
                    description: New JWT access token
                  expires_in:
                    type: integer
                    description: Access token expiration in seconds
                  refresh_token:
                    type: string
                    description: New refresh token
        "400":
          description: Invalid or expired token
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      message:
                        type: string
                        example: "Invalid or expired reset token"
                      status:
                        type: integer
                        example: 400
        "422":
          description: Validation error (weak password, missing fields)
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      message:
                        type: string
                      status:
                        type: integer
                        example: 422

  /api/auth/{provider}/login:
    get:
      summary: Start OAuth2 authentication or provider linking
      description: |
        Redirects the user to the external OAuth2 provider's consent page.
        
        **Dual Purpose:**
        - **Login Flow** (no Authorization header): Creates new user or logs in existing user
        - **Link Provider Flow** (with Authorization header): Links provider to authenticated user's account
        
        The operation type is determined by the presence of a valid JWT token in the Authorization header.
        For linking operations, the user context is securely encoded in the OAuth `state` parameter.
      parameters:
        - in: path
          name: provider
          required: true
          description: The OAuth2 provider to use (github, gitlab). Case-insensitive.
          schema:
            type: string
            enum: [github, gitlab]
        - in: header
          name: Authorization
          required: false
          description: |
            Bearer JWT token for linking operations. 
            If present and valid, initiates provider linking for the authenticated user.
            If absent, initiates login flow.
          schema:
            type: string
            pattern: '^Bearer .+'
      responses:
        "303":
          description: Temporary redirect to OAuth2 provider
          headers:
            Location:
              description: OAuth2 provider authorization URL with state parameter
              schema:
                type: string
        "401":
          description: Invalid JWT token in Authorization header (for linking operations)
        "422":
          description: Unknown or unsupported provider
          content:
            application/json:
              schema:
                type: object
                properties:
                  provider_name: {type: string}
                  error: {type: string}

  /api/auth/{provider}/callback:
    get:
      summary: OAuth2 callback handler for login and provider linking
      description: |
        Handles the redirect from the provider after user authorization.
        Exchanges the authorization code for an access token and fetches user info.
        
        **Behavior depends on the operation type encoded in the state parameter:**
        
        **Login Flow:**
        - Creates new user if email doesn't exist (returns 202 for username selection)
        - Logs in existing user if email matches (returns 200)
        - Returns JWT token for authentication
        
        **Link Provider Flow:**
        - Links provider to existing authenticated user (returns 200)
        - Adds new email as secondary if it doesn't exist for the user
        - Returns updated user profile and email list
        
        **Note:** The `email` field in responses is always the user's primary email (if available).
      parameters:
        - in: path
          name: provider
          required: true
          description: The OAuth2 provider (github, gitlab). Case-insensitive.
          schema:
            type: string
            enum: [github, gitlab]
        - in: query
          name: code
          required: true
          description: Authorization code received from the provider.
          schema:
            type: string
        - in: query
          name: state
          required: false
          description: |
            OAuth state parameter containing operation context.
            For linking operations, contains signed user information.
          schema:
            type: string
      responses:
        "200":
          description: Successfully processed OAuth callback
          content:
            application/json:
              oneOf:
                - title: Login Response
                  description: Response for login operations (existing user)
                  type: object
                  properties:
                    operation:
                      type: string
                      enum: [login]
                    user:
                      type: object
                      properties:
                        id:
                          type: string
                        username:
                          type: string
                        email:
                          type: string
                          description: Primary email address
                        avatar:
                          type: string
                          nullable: true
                    access_token:
                      type: string
                      description: JWT access token
                    expires_in:
                      type: integer
                      description: Access token expiration in seconds
                    refresh_token:
                      type: string
                      description: Refresh token for getting new access tokens
                  example:
                    operation: "login"
                    user:
                      id: "123e4567-e89b-12d3-a456-426614174000"
                      username: "henri"
                      email: "henri@example.com"
                      avatar: "https://gitlab.com/uploads/avatar.png"
                    access_token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                    expires_in: 900
                    refresh_token: "def502004f8c7..."
                - title: Link Provider Response
                  description: Response for provider linking operations
                  type: object
                  properties:
                    operation:
                      type: string
                      enum: [link]
                    message:
                      type: string
                      example: "Provider successfully linked"
                    user:
                      type: object
                      properties:
                        id:
                          type: string
                        username:
                          type: string
                        avatar:
                          type: string
                          nullable: true
                    emails:
                      type: array
                      items:
                        type: object
                        properties:
                          id:
                            type: string
                          email:
                            type: string
                          is_primary:
                            type: boolean
                          is_verified:
                            type: boolean
                    new_email_added:
                      type: boolean
                      description: Whether a new email was added from this provider
                    new_email:
                      type: string
                      nullable: true
                      description: The new email that was added (if any)
                  example:
                    operation: "link"
                    message: "GitHub successfully linked"
                    user:
                      id: "123e4567-e89b-12d3-a456-426614174000"
                      username: "henri"
                      avatar: "https://gitlab.com/uploads/avatar.png"
                    emails:
                      - id: "456e7890-e89b-12d3-a456-426614174001"
                        email: "henri@example.com"
                        is_primary: true
                        is_verified: true
                      - id: "789e0123-e89b-12d3-a456-426614174002"
                        email: "henri@github.com"
                        is_primary: false
                        is_verified: false
                    new_email_added: true
                    new_email: "henri@github.com"
        "202":
          description: New user - username selection required
          content:
            application/json:
              schema:
                type: object
                properties:
                  operation: {type: string, enum: [registration_required]}
                  registration_token: {type: string, description: "RSA-signed JWT"}
                  provider_info:
                    type: object
                    properties:
                      email: {type: string}
                      avatar: {type: string, nullable: true}
                      suggested_username: {type: string}
                  requires_username: {type: boolean, example: true}
        "400":
          description: Missing or invalid authorization code / invalid state parameter / missing required parameters
        "401":
          description: Authentication rejected by the provider / invalid authorization code
        "409":
          description: Provider linking conflict
          content:
            application/json:
              schema:
                type: object
                properties:
                  operation:
                    type: string
                    enum: [link]
                  error:
                    type: string
                  message:
                    type: string
              examples:
                already_linked_same_user:
                  summary: Provider already linked to same user
                  value:
                    operation: "link"
                    error: "provider_already_linked_to_same_user"
                    message: "GitHub is already linked to your account"
                already_linked_different_user:
                  summary: Provider linked to different user
                  value:
                    operation: "link"
                    error: "provider_already_linked"
                    message: "This GitHub account is already linked to another user"
        "422":
          description: Unsupported provider
          content:
            application/json:
              schema:
                type: object
                properties:
                  provider_name: {type: string}
                  error: {type: string}
        "500":
          description: Error while communicating with the OAuth provider

  /api/auth/complete-registration:
    post:
      summary: Complete user registration with username choice
      description: |
        Used once per user to complete registration. Validates RSA-signed registration_token
        containing user email. Triggers user_signed_up domain event.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                registration_token:
                  type: string
                  description: RSA-signed JWT containing email, user_id, exp
                username:
                  type: string
                  minLength: 3
                  maxLength: 50
                  pattern: '^[a-zA-Z0-9_-]+$'
              required: [registration_token, username]
      responses:
        "200":
          description: Registration completed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    type: object
                    properties:
                      id: {type: string}
                      username: {type: string}
                      email: {type: string}
                      avatar: {type: string, nullable: true}
                  access_token: {type: string}
                  expires_in: {type: integer}
                  refresh_token: {type: string}
        "400":
          description: Invalid or expired registration token
          content:
            application/json:
              schema:
                type: object
                properties:
                  error: 
                    type: object
                    properties:
                      error_code: {type: string}
                      message: {type: string}
              examples:
                expired_token:
                  value:
                    error:
                      error_code: "token_expired"
                      message: "Registration token has expired"
                invalid_signature:
                  value:
                    error:
                      error_code: "invalid_token"
                      message: "Invalid registration token signature"
        "409":
          description: Username already taken
        "422":
          description: Invalid username format or missing required fields

  /api/auth/username/check:
    get:
      summary: Check username availability
      parameters:
        - in: query
          name: username
          required: true
          schema:
            type: string
            minLength: 3
            maxLength: 50
      responses:
        "200":
          description: Username availability status
          content:
            application/json:
              schema:
                type: object
                properties:
                  available: {type: boolean}
                  suggestions:
                    type: array
                    items: {type: string}
                    description: Alternative suggestions if username taken
              example:
                available: false
                suggestions: ["johndoe123", "johndoe_", "j_doe"]
        "400":
          description: Username too short (less than 3 characters)
        "422":
          description: Username validation error (too short, missing parameter)

  /api/token/refresh:
    post:
      summary: Refresh access token
      description: |
        Exchanges a valid refresh token for a new JWT access token and a new refresh token. 
        The old refresh token is invalidated and deleted from the database when a new one is issued.
        The new refresh token resets the expiration period (default: 30 days).
        
        **Security Note:** Each refresh operation generates a new refresh token and invalidates the previous one,
        implementing refresh token rotation for enhanced security.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
                  description: The refresh token issued at login or from a previous refresh.
      responses:
        "200":
          description: New access token and refresh token issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                    description: New JWT access token
                  expires_in:
                    type: integer
                    description: Access token expiration in seconds (default: 900 = 15 minutes)
                  refresh_token:
                    type: string
                    description: New refresh token (replaces the old one)
                  refresh_expires_in:
                    type: integer
                    description: Refresh token expiration in seconds (default: 2592000 = 30 days)
              example:
                access_token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                expires_in: 900
                refresh_token: "def502004f8c7abc123..."
                refresh_expires_in: 2592000
        "400":
          description: Malformed or missing refresh token / malformed JSON / wrong content type
        "401":
          description: Invalid or expired refresh token
        "422":
          description: Empty refresh token field

  /api/auth/password/reset-authenticated:
    post:
      summary: Reset password (authenticated user)
      description: |
        Allows an authenticated user to change their password without requiring a reset token.
        This endpoint requires a valid JWT token for authentication.
        
        **Security:** All existing refresh tokens for the user are invalidated after password change
        for security purposes. The user will need to re-authenticate after this operation.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                current_password:
                  type: string
                  description: Current password for verification
                new_password:
                  type: string
                  minLength: 8
                  description: New password (minimum 8 characters)
              required:
                - current_password
                - new_password
      responses:
        "200":
          description: Password successfully changed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Password successfully changed"
                  user:
                    type: object
                    properties:
                      id:
                        type: string
                      username:
                        type: string
                      email:
                        type: string
                  access_token:
                    type: string
                    description: New JWT access token
                  expires_in:
                    type: integer
                    description: Access token expiration in seconds
                  refresh_token:
                    type: string
                    description: New refresh token
        "400":
          description: Current password is incorrect
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      message:
                        type: string
                        example: "Current password is incorrect"
                      status:
                        type: integer
                        example: 400
        "401":
          description: Invalid or expired JWT token / missing Authorization header
        "422":
          description: Validation error (weak password, missing fields)
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      message:
                        type: string
                      status:
                        type: integer
                        example: 422
          
  /api/me:
    get:
      summary: Get current authenticated user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Authenticated user's profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: {type: string}
                  username: {type: string}
                  email: {type: string, description: "Primary email address", nullable: true}
                  avatar_url: {type: string, nullable: true}
              example:
                id: "github_9876"
                username: "djoe-denne"
                avatar_url: "https://avatars.githubusercontent.com/u/1234"
                email: "dj@example.com"  # This is the primary email
              
              # Note: The `email` field is always the user's primary email (if available). Users may have multiple emails.
        "401":
          description: Invalid or expired JWT token / missing Authorization header / malformed token

  /.well-known/jwks.json:
    get:
      summary: JSON Web Key Set (JWKS)
      description: |
        Public keys used to verify JWT tokens issued by this IAM service. This endpoint can be used by reverse proxies or services like Istio to validate token signatures.
      responses:
        "200":
          description: Public keys
          content:
            application/json:
              example:
                keys:
                  - kty: RSA
                    kid: abc123
                    use: sig
                    alg: RS256
                    n: "...base64 modulus..."
                    e: "AQAB"

  /internal/{provider}/token:
    post:
      summary: Retrieve user's provider access token
      description: |
        Returns the OAuth2 access token for the authenticated user and specified provider.
        This endpoint is intended for internal use (e.g. reverse proxy or internal services).
      parameters:
        - in: path
          name: provider
          required: true
          description: OAuth2 provider name (github, gitlab). Case-insensitive.
          schema:
            type: string
            enum: [github, gitlab]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Access token for the authenticated user and specified provider
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token: {type: string}
                  expires_in: {type: integer, nullable: true}
              example:
                access_token: "gho_xyz..."
                expires_in: 3600
        "401":
          description: Invalid or expired JWT token / missing Authorization header / user not found
        "404":
          description: No token available for the user and provider
        "422":
          description: Unsupported provider

  /internal/{provider}/revoke:
    delete:
      summary: Revoke user's provider access token
      description: |
        Revokes (deletes) the OAuth2 access token for the authenticated user and specified provider.
        This permanently removes the user's authorization for the specified provider.
        
        **Idempotent**: Multiple calls to revoke the same token will return appropriate responses.
        First call returns 200, subsequent calls return 404 (no token to revoke).
      parameters:
        - in: path
          name: provider
          required: true
          description: OAuth2 provider name (github, gitlab). Case-insensitive.
          schema:
            type: string
            enum: [github, gitlab]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Provider access token revoked successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: {type: string}
              example:
                message: "Provider GitHub token revoked successfully"
        "401":
          description: Invalid or expired JWT token / missing Authorization header
        "404":
          description: No token available for the user and provider / user not found
        "422":
          description: Unsupported provider

  /api/auth/{provider}/relink-start:
    get:
      summary: Generate OAuth authorization URL for relinking provider
      description: |
        Generates an OAuth2 authorization URL for relinking an existing provider to the user's account.
        This replaces the existing provider token with new credentials.
        
        **Use Case**: When a user wants to update their provider authorization or when their existing token has been revoked.
        
        **Note**: This endpoint does not require authentication - it simply generates the authorization URL.
        The actual relinking happens in the callback endpoint which requires authentication.
      parameters:
        - in: path
          name: provider
          required: true
          description: OAuth2 provider name (github, gitlab). Case-insensitive.
          schema:
            type: string
            enum: [github, gitlab]
      responses:
        "200":
          description: Authorization URL for provider relinking
          content:
            application/json:
              schema:
                type: object
                properties:
                  auth_url: {type: string}
              example:
                auth_url: "https://github.com/login/oauth/authorize?client_id=..."
        "422":
          description: Unsupported provider

  /api/auth/{provider}/relink-callback:
    get:
      summary: Handle OAuth callback for provider relinking
      description: |
        Handles the OAuth2 callback for relinking a provider to the authenticated user's account.
        This replaces the existing provider token with the new authorization.
        
        **Security**: Requires JWT authentication to ensure only the token owner can relink their provider.
        
        **Business Rule**: The provider must already be linked to the user's account. To link a new provider,
        use the standard `/api/auth/{provider}/callback` endpoint instead.
      parameters:
        - in: path
          name: provider
          required: true
          description: OAuth2 provider name (github, gitlab). Case-insensitive.
          schema:
            type: string
            enum: [github, gitlab]
        - in: query
          name: code
          required: true
          description: Authorization code from OAuth provider
          schema:
            type: string
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Provider successfully relinked
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    type: object
                    properties:
                      id: {type: string}
                      username: {type: string}
                      email: {type: string}
                      avatar_url: {type: string, nullable: true}
                  emails:
                    type: array
                    items:
                      type: object
                      properties:
                        id: {type: string}
                        email: {type: string}
                        is_primary: {type: boolean}
                        is_verified: {type: boolean}
                  new_email_added: {type: boolean}
                  new_email: {type: string, nullable: true}
              example:
                user:
                  id: "123e4567-e89b-12d3-a456-426614174000"
                  username: "john_doe"
                  email: "john@example.com"
                  avatar_url: "https://github.com/johndoe.png"
                emails:
                  - id: "email_1"
                    email: "john@example.com"
                    is_primary: true
                    is_verified: true
                new_email_added: false
                new_email: null
        "401":
          description: Invalid or expired JWT token / missing Authorization header
        "422":
          description: |
            Validation error or business rule violation:
            - Unsupported provider
            - Missing authorization code
            - Provider not currently linked to user
            - OAuth flow error
        "500":
          description: Internal server error during OAuth flow

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
